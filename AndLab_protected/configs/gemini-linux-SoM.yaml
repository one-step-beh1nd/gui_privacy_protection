agent:
  name: OpenAIAgent
  args:
    api_key: ""
    api_base: ""
    model_name: "gemini-3-flash-preview"
    max_new_tokens: 512

task:
  class: ScreenshotMobileTask_AutoTest
  args:
    save_dir: "./logs/evaluation"
    max_rounds: 25
    request_interval: 3
    mode: "in_app"

eval:
  avd_name: Pixel_7_Pro_API_33
  avd_log_dir: ./logs/evaluation
  docker: True
  docker_args:
    image_name: python-android-env-test:latest
    port: 6060


privacy:
  enabled: true
  method: token_anonymization
  args: {}